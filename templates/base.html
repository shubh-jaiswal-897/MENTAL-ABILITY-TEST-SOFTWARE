<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MENTAL ABILITY TEST SOFTWARE{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
  <a class="navbar-brand" href="{% url 'quiz:index' %}">MENTAL ABILITY TEST SOFTWARE</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'quiz:index' %}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'quiz:about' %}">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'quiz:contact' %}">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'quiz:test_session' %}">Test Session</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'quiz:revision' %}">Revision</a>
            </li>
          </ul>

          <div class="d-flex">
            {% if user.is_authenticated %}
              <span class="navbar-text me-2">Hello, {{ user.username }}</span>
              <form action="{% url 'logout' %}" method="post" style="display:inline">{% csrf_token %}
                <button class="btn btn-outline-primary btn-sm" type="submit">Logout</button>
              </form>
            {% else %}
              <a class="btn btn-outline-primary btn-sm me-2" href="{% url 'quiz:signup' %}">Sign up</a>
              <a class="btn btn-outline-primary btn-sm me-2" href="{% url 'login' %}">Student Login</a>
              <a class="btn btn-outline-dark btn-sm" href="/admin/">Admin</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
